<!DOCTYPE html>
<html>
<head>
    <title>AI Monitoring Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>

<body style="
    margin:0;
    font-family:Poppins, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color:white;
    display:flex;
">

<!-- SIDEBAR -->
<div style="
    width:230px;
    height:100vh;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    padding:20px;
">

    <h2>⚡ AI Monitor</h2>
    <hr style="border-color:rgba(255,255,255,0.1)">

    <p style="color:#bbb;">Dashboard</p>
    <p style="color:#bbb;">Analytics</p>
    <p style="color:#bbb;">Alerts</p>

</div>

<!-- MAIN -->
<div style="flex:1; padding:20px;">

    <!-- HEADER -->
    <h1 style="margin-bottom:20px;">🤖 AI Monitoring Dashboard</h1>

    <!-- CARDS -->
    <div style="display:flex; gap:20px;">

        <div class="card">
            <h3>CPU</h3>
            <p id="cpu"></p>
        </div>

        <div class="card">
            <h3>Memory</h3>
            <p id="memory"></p>
        </div>

        <div class="card">
            <h3>Status</h3>
            <p id="status"></p>
        </div>

    </div>

    <!-- ALERT -->
    <div style="margin-top:20px;">
        <h2 id="alert" style="color:#ff4d4d;"></h2>
    </div>

    <!-- GRAPH -->
    <div style="
        margin-top:30px;
        background:rgba(255,255,255,0.05);
        padding:20px;
        border-radius:15px;
        backdrop-filter:blur(10px);
    ">
        <canvas id="chart"></canvas>
    </div>

</div>

<style>
.card {
    flex:1;
    background:rgba(255,255,255,0.08);
    padding:20px;
    border-radius:15px;
    backdrop-filter:blur(10px);
    transition:0.3s;
}

.card:hover {
    transform:scale(1.05);
}

.card h3 {
    margin:0;
    color:#ccc;
}

.card p {
    font-size:26px;
    margin-top:10px;
}
</style>

<script>
const ctx = document.getElementById('chart').getContext('2d');

let labels = [];
let cpuData = [];
let memoryData = [];

const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: labels,
        datasets: [
            {
                label: 'CPU',
                data: cpuData,
                borderColor: '#00f2ff',
                tension: 0.4
            },
            {
                label: 'Memory',
                data: memoryData,
                borderColor: '#ff9800',
                tension: 0.4
            }
        ]
    },
    options: {
        plugins: {
            legend: {
                labels: { color: "white" }
            }
        },
        scales: {
            x: { ticks: { color: "white" }},
            y: { ticks: { color: "white" }, beginAtZero:true }
        }
    }
});

async function fetchData() {
    const res = await fetch('/data');
    const data = await res.json();

    const time = new Date().toLocaleTimeString();

    document.getElementById('cpu').innerText = data.cpu + "%";
    document.getElementById('memory').innerText = data.memory + "%";
    document.getElementById('status').innerText = data.status;

    if (data.status.includes("Anomaly")) {
        document.getElementById('alert').innerText = "🚨 ANOMALY DETECTED!";
    } else {
        document.getElementById('alert').innerText = "";
    }

    labels.push(time);
    cpuData.push(data.cpu);
    memoryData.push(data.memory);

    if (labels.length > 15) {
        labels.shift();
        cpuData.shift();
        memoryData.shift();
    }

    chart.update();
}

setInterval(fetchData, 2000);
</script>

</body>
</html>
